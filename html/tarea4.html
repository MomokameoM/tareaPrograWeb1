<body>

        <input type="radio" name="sexo" id="femenino" value="femenino"> Femenino</div>

        <p><input type="checkbox" name="info" id="info"> Declaro haber leido bien las condiciones generales del programa y la normativa sobre protección de datos.</p>
        
    </div>  
        
        
        
        <p><input type="submit" value="Enviar"></p>

    </div>
